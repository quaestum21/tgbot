stages:
  - build
  - deploy

variables:
  BOT_IMAGE: "gitlab.kidsgames.top:5050/$CI_PROJECT_PATH"

# --- Build Stage ---
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD gitlab.kidsgames.top:5050
  script:
    - docker build -t $BOT_IMAGE:$CI_COMMIT_SHORT_SHA -t $BOT_IMAGE:latest .
    - docker push $BOT_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $BOT_IMAGE:latest
  when: manual

# --- Deploy Stage ---
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > /tmp/deploy_key
    - chmod 400 /tmp/deploy_key
    - ssh-add /tmp/deploy_key
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
  variables:
    SSH_USER: admin
    PROJECT_PATH: /opt/bot-monitor-tg
  script:
    - >
      ssh $SSH_USER@$SSH_HOST
      "docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD gitlab.kidsgames.top:5050 &&
      cd $PROJECT_PATH &&
      docker compose -f docker-compose.deploy.yml pull &&
      docker compose -f docker-compose.deploy.yml up -d"
  when: manual
